name: CI Pipeline Template

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Secrets scanning - runs on EVERY commit/PR
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build & Test
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test \
            sh -c "npm test 2>/dev/null || go test ./... 2>/dev/null || python -m pytest 2>/dev/null || echo 'No test framework detected'"

  # Job 3: Push to registry (only on main branch or manual dispatch)
  push-image:
    name: Push Image to Registry
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ github.event.inputs.environment || 'dev' }}-latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: echo "IMAGE_DIGEST=${{ steps.meta.outputs.tags }}" >> $GITHUB_OUTPUT

  # Job 4: Update Kustomize overlay (promotion)
  promote:
    name: Promote to Environment
    runs-on: ubuntu-latest
    needs: push-image
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine target overlay
        id: overlay
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "path=apps/sample-app/k8s/overlays/$ENV/kustomization.yaml" >> $GITHUB_OUTPUT

      - name: Update image tag in overlay
        id: update
        run: |
          OVERLAY="${{ steps.overlay.outputs.path }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.environment }}-latest"
          
          # Use yq to update the image in kustomization.yaml
          yq eval -i ".patches[0].patch |= sub(\"image: .*\", \"image: $IMAGE\")" "$OVERLAY"
          
          # Show diff
          git diff "$OVERLAY"

      - name: Create PR for promotion
        if: github.event.inputs.environment != 'dev'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: promote/${{ github.event.inputs.environment }}/${{ github.sha }}
          title: "Promote to ${{ github.event.inputs.environment }}: ${{ github.sha }}"
          body: |
            Automated promotion triggered by workflow dispatch.
            
            **Image:** `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.environment }}-latest`
            
            **Commit:** ${{ github.sha }}
          labels: promotion, ${{ github.event.inputs.environment }}

      - name: Auto-merge dev (no PR needed)
        if: github.event.inputs.environment == 'dev'
        run: |
          git add ${{ steps.overlay.outputs.path }}
          git commit -m "chore: update dev image to ${{ github.sha }}"
          git push