
title = "GitOps Platform Gitleaks Config"


[allowlist]
description = "Global allowlist for false positives"

paths = [
  "(.*/)?test(s?)/.*",
  "(.*/)?_test\\.go",
  "(.*/)?\\.spec\\.(ts|js)",
  "README\\.md",
  "CHANGELOG\\.md",
  "\\.gitleaks\\.toml",
]

regexes = [
  '''(?i)(example|test|fake|dummy|placeholder|your[_-]?key|your[_-]?secret|changeme|xxx+)''',
  '''^[A-Za-z0-9+/=]{1,20}$''',
]

files = [
  "docs/**",
  "*.md",
  "*.txt",
  "*.yaml.example",
  "*.yml.example",
]

verbose = true
redact = true
no-git = false
max-target-megabytes = 50