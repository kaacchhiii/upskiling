apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sample-app
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: sample-app
                image: dikachi/sample-app:dev-latest
                env:
                  - name: ENVIRONMENT
                    value: "dev"
                  - name: LOG_LEVEL
                    value: "debug"
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
  target:
    kind: Deployment
    name: sample-app
commonLabels:
  environment: dev
