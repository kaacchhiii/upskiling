name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-images:
    name: Scan Container Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan nginx image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "nginx:1.27-alpine"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Scan postgres image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "postgres:16-alpine"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Build backend image
        run: docker build -t mile1-backend:scan apps/backend/

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "mile1-backend:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  scan-manifests:
    name: Scan K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan manifests for misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "k8s/"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  scan-filesystem:
    name: Scan Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan backend dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/backend/"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
