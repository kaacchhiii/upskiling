name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: apps/sample-app
          push: false
          load: true
          tags: sample-app:test
      - name: Run tests
        run: |
          docker run --rm sample-app:test \
            sh -c "npm test 2>/dev/null || go test ./... 2>/dev/null || python -m pytest 2>/dev/null || echo 'No test framework detected'"