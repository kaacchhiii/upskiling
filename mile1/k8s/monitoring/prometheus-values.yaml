grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin
  service:
    type: NodePort

prometheus:
  prometheusSpec:
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

additionalPrometheusRulesMap:
  app-alerts:
    groups:
      - name: app-pod-health
        rules:
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace="app"}[10m]) > 3
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"

additionalServiceMonitors:
  - name: backend-monitor
    selector:
      matchLabels:
        app: backend
    namespaceSelector:
      matchNames:
        - app
    endpoints:
      - port: http
        path: /health
        interval: 15s
