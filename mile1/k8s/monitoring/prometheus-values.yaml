# Helm values for kube-prometheus-stack
# Installs Prometheus + Grafana + Alertmanager in one go

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin          # change in production
  service:
    type: NodePort              # easy access on minikube/kind

prometheus:
  prometheusSpec:
    retention: 7d               # keep metrics for 7 days
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Alert: fire if any pod in "app" namespace restarts more than 3 times in 10 min
additionalPrometheusRulesMap:
  app-alerts:
    groups:
      - name: app-pod-health
        rules:
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace="app"}[10m]) > 3
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"

# Tell Prometheus to scrape the backend /health endpoint
additionalServiceMonitors:
  - name: backend-monitor
    selector:
      matchLabels:
        app: backend
    namespaceSelector:
      matchNames:
        - app
    endpoints:
      - port: http
        path: /health
        interval: 15s
